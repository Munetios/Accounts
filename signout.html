<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing out of all accounts...</title>

    <!-- Munetios CSS -->
    <link rel="stylesheet" href="https://api.munetios.com/beautiful-css/beautiful.css" />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght,ROND@6..144,1..1000,80&display=swap");

      body {
        margin: 0;
        font-family: "Google Sans Flex", sans-serif;
        background: radial-gradient(circle at top, #14052a, #0b011a);
        color: white;
      }

      .app-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
      }

      .card {
        padding: 30px 40px;
        border-radius: 20px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: rgb(150,106,255);
        animation: spin 0.9s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .text {
        font-size: 18px;
        font-weight: 500;
        background: linear-gradient(90deg, rgb(150,106,255), rgb(227,201,255));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtext {
        margin-top: 8px;
        font-size: 13px;
        opacity: 0.7;
      }
    </style>

    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="https://www.munetios.com/favicon-new.ico" />
  </head>

  <body>
    <main class="app-container">
      <div class="card liquid-glass">
        <div class="spinner"></div>
        <p class="text" id="logoutText">Signing out of all accounts...</p>
        <div class="subtext">Munetios Accounts</div>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const rawUrl = params.get("url");

      // 🌍 Language handling
      const lang = (navigator.language || "en").toLowerCase().split("-")[0];

      const translations = {
        en: "Signing out of all accounts...",
        es: "Cerrando sesión en todas las cuentas...",
        de: "Abmeldung von allen Konten...",
        fr: "Déconnexion de tous les comptes...",
        pt: "Desconectando de todas as contas...",
        nl: "Afmelden van alle accounts...",
        ja: "すべてのアカウントからサインアウト中...",
        zh: "正在从所有账户注销...",
        ko: "모든 계정에서 로그아웃 중...",
        ar: "جاري تسجيل الخروج من جميع الحسابات...",
      };

      document.getElementById("logoutText").textContent =
        translations[lang] || translations.en;

      // 🔒 Secure redirect validation
      function getSafeRedirect(url) {
        try {
          const parsed = new URL(url);

          // Only allow HTTPS + Munetios domains
          if (
            parsed.protocol === "https:" &&
            parsed.hostname.endsWith("munetios.com")
          ) {
            return parsed.href;
          }
        } catch (e) {}

        return "https://www.munetios.com/";
      }

      const safeRedirect = getSafeRedirect(rawUrl);

      // ⏳ Simulate logout delay
      setTimeout(() => {
        location.replace(safeRedirect);
      }, 1800);
    </script>
  </body>
</html>
